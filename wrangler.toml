name = "pancake-pos-mcp"
main = "src/worker.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
PANCAKE_BASE_URL = "https://pos.pages.fm/api/v1"
# PANCAKE_API_KEY and PANCAKE_SHOP_ID must be set via `wrangler secret put`
# Do NOT define them here — [vars] would shadow encrypted secrets
